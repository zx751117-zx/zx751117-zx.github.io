<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 | 东盈创世</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/footer.css">
<script src="js/header.js"></script>
<script src="js/footer.js"></script>
</head>
<body>

<div id="header-placeholder"></div>

<section class="section">
  <div class="container">
    <div class="title">
      <h2>联系我们</h2>
      <p>欢迎咨询、索取资料或询价。</p>
    </div>

    <div class="contact-grid">
      <div class="contact-box">
        <h3>联系方式</h3>
        <p>请使用以下信息与我们联系，我们将尽快回复。</p>
        <div class="contact-details">
          <p><strong>京都总部</strong><br>〒610-1102 京都府京都市西京区御陵大枝山町1-17-12</p>
          <p><strong>东京办公室</strong><br>〒104-0041 东京都中央区新富1-13-24 LM贝尔科特新富町501室</p>
          <p><strong>电话</strong><br>075-203-0940</p>
          <p><strong>邮箱</strong><br>info@yinchung.com</p>
        </div>
      </div>

      <div class="contact-form">
        <form id="contact-form">
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" placeholder="例：张三">
          </div>

          <div class="form-group">
            <label for="company">公司名称</label>
            <input type="text" id="company" name="company" placeholder="例：某某有限公司">
          </div>

          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com">
          </div>

          <div class="form-group">
            <label for="message">咨询内容</label>
            <textarea id="message" name="message" rows="8" placeholder="请填写咨询内容"></textarea>
          </div>

          <button type="button" class="button-primary">发送邮件</button>
        </form>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/contact.js"></script>
</body>
</html>
