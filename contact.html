<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東盈創世 | お問い合わせ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/footer.css">
<script src="js/header.js"></script>
<script src="js/footer.js"></script>
</head>
<body>

<div id="header-placeholder"></div>

<section class="section">
  <div class="container">
    <div class="title">
      <h2>お問い合わせ</h2>
      <p>ご相談・資料請求・お見積もりのご依頼はこちらから承ります。</p>
    </div>

    <div class="contact-grid">
      <div class="contact-box">
        <h3>お問い合わせ先</h3>
        <p>以下の情報でお気軽にお問い合わせください。迅速にご対応いたします。</p>
        <div class="contact-details">
          <p><strong>京都本社</strong><br>〒610-1102 京都府京都市西京区御陵大枝山町1-17-12</p>
          <p><strong>東京事務所</strong><br>〒104-0041 東京都中央区新富1-13-24 LMベルコート新富町501室</p>
          <p><strong>電話</strong><br>075-203-0940</p>
          <p><strong>メール</strong><br>info@yinchung.com</p>
        </div>
      </div>

      <div class="contact-form">
        <form id="contact-form">
          <div class="form-group">
            <label for="name">お名前</label>
            <input type="text" id="name" name="name" placeholder="例：山田 太郎">
          </div>

          <div class="form-group">
            <label for="company">会社名</label>
            <input type="text" id="company" name="company" placeholder="例：〇〇株式会社">
          </div>

          <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com">
          </div>

          <div class="form-group">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message" rows="8" placeholder="ご相談内容をご記入ください"></textarea>
          </div>

          <button type="button" class="button-primary">送信する</button>
        </form>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/contact.js"></script>
</body>
</html>
